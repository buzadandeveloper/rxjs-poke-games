name: pr-build
on:
  pull_request:
    branches:
      - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
          - name: Checkout repository
            uses: actions/checkout@v4

          - name: Setup bun
            uses: oven-sh/setup-bun@v2
            with:
              bun-version: latest

          - name: Install dependencies
            run: bun install --frozen-lockfile

          - name: Build
            run: bun run build